<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель MLT Drinks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      background: #111827;
      color: #fff;
      padding: 20px;
    }
    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      font-size: 16px;
    }
    table {
      width: 100%;
      background: #fff;
      color: #000;
      margin-top: 20px;
    }
    table th, table td {
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Админ-панель MLT Drinks</h1>

  <input type="text" placeholder="Название" id="productName">
  <input type="number" placeholder="Цена" id="productPrice">
  <select id="productCategory">
    <option>Газировка</option>
    <option>Натуральные</option>
    <option>Энергетики</option>
  </select>
  <select id="productAvailable">
    <option value="true">В наличии</option>
    <option value="false">Нет в наличии</option>
  </select>
  <button onclick="addProduct()">Добавить</button>

  <h2>Категории</h2>
  <input type="text" id="newCategory" placeholder="Новая категория">
  <button onclick="addCategory()">Добавить категорию</button>

  <h2>Список товаров</h2>
  <table>
    <thead>
      <tr>
        <th>Название</th>
        <th>Цена</th>
        <th>Категория</th>
        <th>Наличие</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="productList">
    </tbody>
  </table>

  <script>
    const productList = document.getElementById('productList');

    function addProduct() {
      const name = document.getElementById('productName').value;
      const price = document.getElementById('productPrice').value;
      const category = document.getElementById('productCategory').value;
      const available = document.getElementById('productAvailable').value === 'true';

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${name}</td>
        <td>${price}</td>
        <td>${category}</td>
        <td>${available ? 'Да' : 'Нет'}</td>
        <td><button onclick="this.parentElement.parentElement.remove()">Удалить</button></td>
      `;
      productList.appendChild(row);
    }

    function addCategory() {
      const newCat = document.getElementById('newCategory').value;
      const select = document.getElementById('productCategory');
      const option = document.createElement('option');
      option.text = newCat;
      select.add(option);
      document.getElementById('newCategory').value = '';
    }
  </script>
</body>
</html>
