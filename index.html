<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLT Drinks</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f7f7f7;
    }
    h1 {
      font-size: 24px;
    }
    .button {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background-color: #0088cc;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Добро пожаловать в <strong>MLT Drinks</strong>!</h1>

  <div id="buttons">
    <!-- Кнопки будут добавлены через JS -->
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user?.id;
    const adminId = 2010575827; // твой Telegram ID

    const buttonsDiv = document.getElementById('buttons');

    if (userId === adminId) {
      // Показать кнопку админ-панели
      const adminBtn = document.createElement('a');
      adminBtn.href = "admin.html";
      adminBtn.className = "button";
      adminBtn.textContent = "Админ-панель";
      buttonsDiv.appendChild(adminBtn);
    } else {
      // Показать кнопку перейти к ассортименту
      const catalogBtn = document.createElement('a');
      catalogBtn.href = "catalog.html";
      catalogBtn.className = "button";
      catalogBtn.textContent = "Перейти к ассортименту";
      buttonsDiv.appendChild(catalogBtn);
    }
  </script>
</body>
</html>
