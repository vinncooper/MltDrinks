<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог товаров</title>
</head>
<body>
  <h1>Каталог товаров</h1>
  <div id="product-list">
    <p>Загрузка товаров...</p>
  </div>

  <script>
    fetch('/api/products')
      .then(res => res.json())
      .then(products => {
        const container = document.getElementById('product-list');
        if (products.length === 0) {
          container.innerHTML = '<p>Товары не найдены.</p>';
        } else {
          container.innerHTML = '';
          products.forEach(p => {
            container.innerHTML += `
              <div>
                <h3>${p.name}</h3>
                <p>Цена: ${p.price} ₽</p>
                <p>Категория: ${p.category || 'Без категории'}</p>
                <p>${p.in_stock ? 'В наличии' : 'Нет в наличии'}</p>
              </div>
            `;
          });
        }
      });
  </script>
</body>
</html>
